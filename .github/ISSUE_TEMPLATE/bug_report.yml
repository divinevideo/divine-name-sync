name: Bug Report
description: Report a bug or regression
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use generic descriptors instead of partner, customer, or brand names in public issue titles, bodies, and screenshots unless a maintainer explicitly approves naming them.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and its impact on webhook validation, KV sync, or service behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Send webhook ...
        2. Use payload ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Include logs or payloads with sensitive values redacted.
